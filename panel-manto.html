<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Manto — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F0E8;--beige:#E8DDD0;--sand:#D4C5B0;--taupe:#B8A898;
  --warm-gray:#8C7B6E;--charcoal:#4A4038;--dark:#2C2420;--white:#FDFAF6;
  --accent:#C4956A;--accent-light:#DDB89A;
  --ff:'Cormorant Garamond',serif;--fb:'Jost',sans-serif;
  --green:#2d7a4f;--orange:#b86b00;--blue:#1a5276;--red:#922b21;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1A1410;font-family:var(--fb);font-weight:300;color:var(--cream);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--dark);border:1px solid var(--charcoal);padding:3rem;width:min(380px,100%);text-align:center;}
.login-box h1{font-family:var(--ff);font-size:2rem;font-weight:300;margin-bottom:.4rem;}
.login-box p{font-size:.78rem;color:var(--taupe);margin-bottom:2rem;letter-spacing:.04em;}
.login-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid var(--charcoal);color:var(--cream);font-family:var(--fb);font-size:.85rem;outline:none;margin-bottom:12px;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-input::placeholder{color:var(--taupe);}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;font-family:var(--fb);font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.login-btn:hover{background:var(--accent-light);color:var(--dark);}
.login-error{color:#e74c3c;font-size:.75rem;margin-top:.5rem;display:none;}

/* ── PANEL ── */
#panel-screen{display:none;}
.topbar{background:var(--dark);border-bottom:1px solid var(--charcoal);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:var(--ff);font-size:1.4rem;font-weight:300;letter-spacing:.1em;}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.topbar-right a{font-size:.72rem;color:var(--taupe);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .2s;}
.topbar-right a:hover{color:var(--cream);}
.logout-btn{background:none;border:1px solid var(--charcoal);color:var(--taupe);padding:6px 14px;font-family:var(--fb);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:var(--accent);color:var(--cream);}

.panel-body{padding:2rem;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--dark);border:1px solid var(--charcoal);padding:1.4rem;text-align:center;}
.stat-num{font-family:var(--ff);font-size:2.2rem;font-weight:300;color:var(--accent);}
.stat-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--taupe);margin-top:.3rem;}

/* ── FILTROS ── */
.filter-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:6px;}
.filter-label{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);}
.filter-select,.filter-input{padding:9px 12px;background:var(--dark);border:1px solid var(--charcoal);color:var(--cream);font-family:var(--fb);font-size:.8rem;outline:none;min-width:140px;transition:border-color .2s;}
.filter-select:focus,.filter-input:focus{border-color:var(--accent);}
.filter-input::placeholder{color:var(--taupe);}
.filter-btn{padding:9px 20px;background:var(--accent);color:#fff;border:none;font-family:var(--fb);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.filter-btn:hover{background:var(--accent-light);color:var(--dark);}
.clear-btn{padding:9px 14px;background:none;border:1px solid var(--charcoal);color:var(--taupe);font-family:var(--fb);font-size:.72rem;cursor:pointer;transition:all .2s;}
.clear-btn:hover{border-color:var(--accent);color:var(--cream);}

/* ── TABLA ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
thead tr{background:var(--charcoal);}
th{padding:.9rem 1rem;text-align:left;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);font-weight:400;white-space:nowrap;}
td{padding:.9rem 1rem;border-bottom:1px solid var(--charcoal);vertical-align:top;}
tbody tr{transition:background .2s;cursor:pointer;}
tbody tr:hover{background:rgba(196,149,106,.06);}
.td-name{font-weight:400;color:var(--cream);}
.td-contact{color:var(--taupe);font-size:.73rem;line-height:1.6;}
.td-total{font-family:var(--ff);font-size:1rem;color:var(--accent);}
.td-date{color:var(--taupe);font-size:.72rem;white-space:nowrap;}
.td-productos{max-width:220px;}
.td-productos p{font-size:.72rem;color:var(--taupe);line-height:1.5;}

/* ── ESTADOS ── */
.estado-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:2px;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;font-weight:400;white-space:nowrap;}
.estado-recibido   {background:rgba(26,82,118,.3); color:#5dade2;}
.estado-enproceso  {background:rgba(184,107,0,.3);  color:#f0b429;}
.estado-enviado    {background:rgba(45,122,79,.3);   color:#58d68d;}
.estado-finalizado {background:rgba(45,122,79,.5);   color:#a9dfbf;}
.estado-cancelado  {background:rgba(146,43,33,.3);   color:#e74c3c;}

.estado-select{background:transparent;border:none;color:inherit;font-family:var(--fb);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;outline:none;padding:0;}

/* ── MODAL DETALLE ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.detail-box{background:var(--dark);border:1px solid var(--charcoal);width:min(600px,100%);max-height:90vh;overflow-y:auto;padding:2rem;position:relative;}
.detail-box h3{font-family:var(--ff);font-size:1.6rem;font-weight:300;margin-bottom:1.4rem;padding-bottom:1rem;border-bottom:1px solid var(--charcoal);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.4rem;}
.detail-field label{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);display:block;margin-bottom:3px;}
.detail-field p{font-size:.85rem;color:var(--cream);}
.detail-products{margin-bottom:1.4rem;}
.detail-products h4{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);margin-bottom:.8rem;}
.prod-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--charcoal);font-size:.8rem;}
.detail-total{text-align:right;font-family:var(--ff);font-size:1.4rem;color:var(--accent);margin-bottom:1.4rem;}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;}
.action-btn{padding:10px 18px;border:none;font-family:var(--fb);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-wa{background:#25D366;color:#fff;} .btn-wa:hover{background:#1da851;}
.btn-mail{background:var(--charcoal);color:var(--cream);} .btn-mail:hover{background:var(--accent);}
.detail-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--taupe);font-size:1.2rem;cursor:pointer;}

/* ── NOTAS ── */
.notas-input{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid var(--charcoal);color:var(--cream);font-family:var(--fb);font-size:.8rem;resize:vertical;min-height:70px;outline:none;margin-bottom:8px;}
.save-nota-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;font-family:var(--fb);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}

.empty-state{text-align:center;padding:4rem 2rem;color:var(--taupe);font-family:var(--ff);font-size:1rem;}
.loading{text-align:center;padding:3rem;color:var(--taupe);font-size:.85rem;letter-spacing:.1em;}
.refresh-btn{background:none;border:1px solid var(--charcoal);color:var(--taupe);padding:6px 14px;font-family:var(--fb);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--cream);}

@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .filter-row{flex-direction:column;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>M<span style="color:var(--accent)">a</span>nto</h1>
    <p>Panel de gestión de pedidos</p>
    <input class="login-input" type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(e.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Ingresar</button>
    <p class="login-error" id="login-error">Contraseña incorrecta</p>
  </div>
</div>

<!-- PANEL -->
<div id="panel-screen">
  <div class="topbar">
    <span class="topbar-logo">M<span>a</span>nto — Pedidos</span>
    <div class="topbar-right">
      <a href="https://manto-deco.netlify.app" target="_blank">Ver tienda ↗</a>
      <button class="refresh-btn" onclick="loadPedidos()">↻ Actualizar</button>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="panel-body">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total pedidos</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-recibidos">—</div>
        <div class="stat-label">Recibidos</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-enviados">—</div>
        <div class="stat-label">Enviados</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-monto">—</div>
        <div class="stat-label">Total facturado</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">Estado</span>
        <select class="filter-select" id="f-estado" onchange="applyFilters()">
          <option value="">Todos</option>
          <option value="recibido">Recibido</option>
          <option value="enproceso">En proceso</option>
          <option value="enviado">Enviado</option>
          <option value="finalizado">Finalizado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Desde</span>
        <input class="filter-input" type="date" id="f-desde" onchange="applyFilters()">
      </div>
      <div class="filter-group">
        <span class="filter-label">Hasta</span>
        <input class="filter-input" type="date" id="f-hasta" onchange="applyFilters()">
      </div>
      <div class="filter-group">
        <span class="filter-label">Buscar cliente</span>
        <input class="filter-input" type="text" id="f-buscar" placeholder="Nombre, email o teléfono" oninput="applyFilters()">
      </div>
      <button class="clear-btn" onclick="clearFilters()">Limpiar</button>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">
      <div class="loading" id="loading-msg">Cargando pedidos...</div>
      <table id="pedidos-table" style="display:none;">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Cliente</th>
            <th>Contacto</th>
            <th>Dirección</th>
            <th>Productos</th>
            <th>Total</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="pedidos-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">No hay pedidos con ese filtro.</div>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <h3 id="detail-title">Pedido</h3>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const SUPA_URL  = "https://jorsmrrsizmfveqqerdp.supabase.co";
const SUPA_KEY  = "sb_publishable_-2Pysr0B8tGMbuvivfl2dw_vjcUbghx";
const PANEL_PWD = "manto2026"; // ← Cambiá esta contraseña

// ─── LOGIN ────────────────────────────────────────────────────
function login() {
  const pass = document.getElementById("login-pass").value;
  if (pass === PANEL_PWD) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("panel-screen").style.display = "block";
    loadPedidos();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
}
function logout() {
  document.getElementById("panel-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-pass").value = "";
}
document.getElementById("login-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

// ─── DATA ─────────────────────────────────────────────────────
let allPedidos = [];

const fmt = n => "$" + Number(n).toLocaleString("es-AR");
const fmtDate = s => {
  const d = new Date(s);
  return d.toLocaleDateString("es-AR", { day:"2-digit", month:"2-digit", year:"numeric" })
       + " " + d.toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" });
};

async function loadPedidos() {
  document.getElementById("loading-msg").style.display = "block";
  document.getElementById("pedidos-table").style.display = "none";
  document.getElementById("empty-state").style.display = "none";

  try {
    const res = await fetch(
      `${SUPA_URL}/rest/v1/pedidos_manto?select=*&order=created_at.desc`,
      { headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` } }
    );
    allPedidos = await res.json();
    updateStats(allPedidos);
    applyFilters();
  } catch(e) {
    console.error(e);
    document.getElementById("loading-msg").textContent = "Error al cargar. Verificá la conexión.";
  }
}

function updateStats(data) {
  document.getElementById("stat-total").textContent = data.length;
  document.getElementById("stat-recibidos").textContent = data.filter(p => p.estado === "recibido").length;
  document.getElementById("stat-enviados").textContent = data.filter(p => p.estado === "enviado").length;
  const monto = data.reduce((s, p) => s + (p.total || 0), 0);
  document.getElementById("stat-monto").textContent = fmt(monto);
}

// ─── FILTROS ──────────────────────────────────────────────────
function applyFilters() {
  const estado  = document.getElementById("f-estado").value;
  const desde   = document.getElementById("f-desde").value;
  const hasta   = document.getElementById("f-hasta").value;
  const buscar  = document.getElementById("f-buscar").value.toLowerCase();

  let filtered = allPedidos.filter(p => {
    if (estado && p.estado !== estado) return false;
    if (desde && new Date(p.created_at) < new Date(desde)) return false;
    if (hasta && new Date(p.created_at) > new Date(hasta + "T23:59:59")) return false;
    if (buscar) {
      const haystack = `${p.nombre} ${p.apellido} ${p.email} ${p.telefono}`.toLowerCase();
      if (!haystack.includes(buscar)) return false;
    }
    return true;
  });

  renderTable(filtered);
}

function clearFilters() {
  document.getElementById("f-estado").value = "";
  document.getElementById("f-desde").value = "";
  document.getElementById("f-hasta").value = "";
  document.getElementById("f-buscar").value = "";
  applyFilters();
}

// ─── TABLA ────────────────────────────────────────────────────
const ESTADOS = ["recibido","enproceso","enviado","finalizado","cancelado"];
const ESTADO_LABELS = { recibido:"Recibido", enproceso:"En proceso", enviado:"Enviado", finalizado:"Finalizado", cancelado:"Cancelado" };

function renderTable(data) {
  document.getElementById("loading-msg").style.display = "none";

  if (!data.length) {
    document.getElementById("pedidos-table").style.display = "none";
    document.getElementById("empty-state").style.display = "block";
    return;
  }

  document.getElementById("pedidos-table").style.display = "table";
  document.getElementById("empty-state").style.display = "none";

  const tbody = document.getElementById("pedidos-tbody");
  tbody.innerHTML = data.map(p => {
    const prods = (p.productos || []).map(i => `${i.qty}× ${i.nombre}${i.color ? ` (${i.color})` : ""}`).join("<br>");
    const estadoClass = `estado-${(p.estado || "recibido").replace(" ","")}`;
    const opts = ESTADOS.map(e => `<option value="${e}" ${p.estado===e?"selected":""}>${ESTADO_LABELS[e]}</option>`).join("");
    return `<tr onclick="openDetail('${p.id}')">
      <td class="td-date">${fmtDate(p.created_at)}</td>
      <td class="td-name">${p.nombre} ${p.apellido}</td>
      <td class="td-contact">${p.email}<br>${p.telefono}</td>
      <td class="td-contact">${p.direccion}<br>${p.ciudad}</td>
      <td class="td-productos"><p>${prods}</p></td>
      <td class="td-total">${fmt(p.total)}</td>
      <td onclick="event.stopPropagation()">
        <div class="estado-badge ${estadoClass}">
          <select class="estado-select" onchange="updateEstado('${p.id}',this.value)">${opts}</select>
        </div>
      </td>
    </tr>`;
  }).join("");
}

// ─── ACTUALIZAR ESTADO ────────────────────────────────────────
async function updateEstado(id, nuevoEstado) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/pedidos_manto?id=eq.${id}`, {
      method: "PATCH",
      headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({ estado: nuevoEstado })
    });
    const idx = allPedidos.findIndex(p => p.id === id);
    if (idx !== -1) allPedidos[idx].estado = nuevoEstado;
    updateStats(allPedidos);
    applyFilters();
  } catch(e) { console.error("Error actualizando estado:", e); }
}

// ─── MODAL DETALLE ────────────────────────────────────────────
function openDetail(id) {
  const p = allPedidos.find(x => x.id === id);
  if (!p) return;

  const prods = (p.productos || []).map(i =>
    `<div class="prod-row">
      <span>${i.qty}× ${i.nombre}${i.color ? ` — ${i.color}` : ""}</span>
      <span>${fmt(i.subtotal)}</span>
    </div>`).join("");

  document.getElementById("detail-title").textContent = `Pedido de ${p.nombre} ${p.apellido}`;
  document.getElementById("detail-content").innerHTML = `
    <div class="detail-grid">
      <div class="detail-field"><label>Nombre completo</label><p>${p.nombre} ${p.apellido}</p></div>
      <div class="detail-field"><label>Email</label><p>${p.email}</p></div>
      <div class="detail-field"><label>Teléfono</label><p>${p.telefono}</p></div>
      <div class="detail-field"><label>Fecha</label><p>${fmtDate(p.created_at)}</p></div>
      <div class="detail-field" style="grid-column:1/-1"><label>Dirección de envío</label><p>${p.direccion}, ${p.ciudad}</p></div>
    </div>
    <div class="detail-products">
      <h4>Productos</h4>
      ${prods}
    </div>
    <div class="detail-total">Total: ${fmt(p.total)}</div>
    <div class="detail-actions">
      <a href="https://wa.me/${p.telefono.replace(/\D/g,'')}" target="_blank" class="action-btn btn-wa">WhatsApp</a>
      <a href="mailto:${p.email}" class="action-btn btn-mail">Enviar mail</a>
    </div>
    <div style="margin-top:1.4rem;border-top:1px solid var(--charcoal);padding-top:1.2rem;">
      <div class="filter-label" style="margin-bottom:.6rem;">Notas internas</div>
      <textarea class="notas-input" id="nota-text-${p.id}">${p.notas || ""}</textarea>
      <button class="save-nota-btn" onclick="saveNota('${p.id}')">Guardar nota</button>
    </div>`;

  document.getElementById("detail-overlay").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
}

async function saveNota(id) {
  const notas = document.getElementById(`nota-text-${id}`)?.value || "";
  try {
    await fetch(`${SUPA_URL}/rest/v1/pedidos_manto?id=eq.${id}`, {
      method: "PATCH",
      headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({ notas })
    });
    const idx = allPedidos.findIndex(p => p.id === id);
    if (idx !== -1) allPedidos[idx].notas = notas;
    alert("✅ Nota guardada");
  } catch(e) { alert("Error al guardar nota"); }
}
</script>
</body>
</html>
